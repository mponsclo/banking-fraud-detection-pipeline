version: 2

sources:
  - name: raw
    description: Raw data loaded into BigQuery landing dataset
    database: mpc-caixabank-ai
    schema: landing
    tables:
      - name: transactions_data
        description: Credit card transactions for the 2010s decade (loaded via bq load from GCS)
      - name: train_fraud_labels
        description: Binary fraud labels per transaction (loaded via bq load from GCS)
      - name: users_data
        description: Client demographic and financial information (dbt seed)
      - name: cards_data
        description: Credit and debit card details per client (dbt seed)
